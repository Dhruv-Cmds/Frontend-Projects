<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>

    <style>
        .box{
            border-radius: 50%;
            height: 121px;
            width: 121px;
            background-color: red;
            position:absolute;
            bottom: 0;
            left: 0;
            
            animation:  x-bounce 4s ease-in infinite alternate, y-bounce 0.9s ease-out infinite alternate;
        }
        
        .container{
            position:relative;
            height: 80vh;
            width: 80vw;
            background-color: blue;
        }
        
        @keyframes x-bounce {

            from {
                left: 0;
            }
            to {
                left: 100%;
            }
            
        }

        @keyframes y-bounce {

            from {
                bottom: 0;
            }


            to {
                bottom: 100%;
            }

        }
    </style>
</head>
<body>
    
    <div class="container">
        <div class="box"></div>
    </div>
</body>
</html>

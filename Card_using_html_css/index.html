<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geist+Pixel&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap');

        body {
            background-color: gray;
            margin: 100px;
            padding-left: 330px;
        }

        * {
            margin: 0;
            padding: 0;
        }

        .card {
            background-color: white;
            border-radius: 7px;
            width: 198px;
            height: 320px;
        }

        .image {
            padding: 5px;
        }

        .image img {
            border-radius: 7px;
        }

        .content {
            padding: 5px 13px;
        }

        .content h2 {
            font-family: "Roboto Condensed", sans-serif;
            opacity: 85%;
        }

        .content p {
            font-size: 14px;
            font-family: "Geist Pixel", sans-serif;
            padding: 6px 0px;
        }

        .capsules {
            padding: 0px 28px 0px 14px;

        }

        .capsules span {
            border: 1px solid gray;
            border-radius: 5px;
            padding: 1px 4px;
            font-size: 12px;
        }

        .buttom{
            text-align: center;
        }

        .buttom button {
            padding: 5px 11px;
            border-radius: 15px;
            background-color: rgb(170, 206, 237);
            color: blue;
            font-size: 10px;
            margin-top: 7px;
            margin-right: 10px;
            border: none;
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="image">
            <img width=188
                src="https://imgs.search.brave.com/tMvB1f_G3vx-DmgbJLJ01c1N3-Ps9p5yPrexV8mtClQ/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly9zdGF0/aWMudmVjdGVlenku/Y29tL3N5c3RlbS9y/ZXNvdXJjZXMvdGh1/bWJuYWlscy8wNzQv/NTcxLzc0Ny9zbWFs/bC9uYXR1cmUtYmFj/a2dyb3VuZC1uYXR1/cmUtd2FsbHBhcGVy/LWx1c2gtZ3JlZW4t/bWVhZG93LXdpdGgt/YS1zb2xpdGFyeS10/cmVlLWFuZC1mbG93/ZXJpbmctcGxhbnRz/LWxlYWRpbmctdG8t/YS1zdG9uZS1wYXRo/LXRvd2FyZC1tYWpl/c3RpYy1tb3VudGFp/bnMtdW5kZXItYS1w/aG90by5qcGc"
                alt="">
        </div>

        <div class="capsules">
            <span>Nature</span>
            <span>Lake</span>
        </div>

        <div class="content">
            <h2>Filed</h2>
            <p>
                This photo is about to show how
                beautiful and good our nature is.
                We should thanks god to give this us.
            </p>
        </div>

        <div class="buttom">
            <button>Read More</button>
        </div>
    </div>
</body>

</html>
